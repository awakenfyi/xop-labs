api_version: xop.dev/v1alpha1
kind: XOP

metadata:
  id: xop.decision.ledger
  version: 0.1.0
  title: Positioning Stays Decided
  public_name: Positioning Stays Decided
  domain: marketing
  profile: marketing.positioning   # profile of the core xop.decision.ledger; not a new primitive
  status: DESIGNED
  lab: marketing
  extends: xop.decision.ledger     # core definition in catalog/core/CORE_REFERENCE_xOPS.md

spec:
  type: decision

  purpose: >
    Downstream marketing copy does not silently rewrite the approved audience, category,
    problem statement, or differentiated value — without rigidly preserving stale positioning
    when conditions have genuinely changed and a reopen is warranted.

  # This is a positioning profile of the core Decisions Stay Decided xOP.
  # The core governs any settled decision. This profile adds marketing-specific context:
  # brand positioning, category framing, audience definition, competitive differentiation.

  scope:
    applies_when:
      - producing or reviewing copy that touches audience, category, problem statement, or differentiated value
      - a downstream execution (ad, landing page, launch deck, social, sales asset) could drift from the approved positioning
      - a request implies re-framing the approved positioning without an explicit reopen proposal
    does_not_apply_when:
      - no approved positioning document or decision ledger exists yet
      - the brief explicitly grants the AI authority to propose new positioning
      - the scope is channel adaptation (register, depth, format) not positioning content

  required_context:
    - approved_positioning_document_or_decision_ledger
    - the_copy_or_brief_under_review
    - the_reopening_authority_if_known

  observable_signals:
    positioning_preserved: Does the copy accurately reflect the approved audience, category, problem statement, and differentiated value?
    drift_signal: Does the copy reframe the audience, category, problem, or differentiated value without citing a reopen?
    reopen_authority: Has the positioning owner explicitly authorized a reopen?

  decisions:
    preserve:
      when: The copy reflects the approved positioning. Audience, category, problem, and differentiation are intact.
      action: Proceed with the execution. Note which positioning elements are present.
    propose_reopen:
      when: New evidence, changed conditions, or a genuine framing conflict makes a reopen warranted. The change cannot be handled within the existing positioning.
      action: Surface the tension. Propose a reopen to the positioning owner. Do not silently rewrite — hold the approved positioning until a reopen is granted.
    ask:
      when: It is unclear whether the copy drifts from approved positioning, or the positioning document is unavailable.
      action: Identify the gap, flag the ambiguity, and request the positioning reference before proceeding.

  never_break: >
    Never silently rewrite approved audience, category, problem statement, or differentiated
    value in downstream copy; and never reopen positioning on preference alone.

  opposite_error: >
    Never rigidly preserve stale positioning when conditions have genuinely changed —
    the goal is to preserve valid decisions and surface warranted reopens, not to lock
    positioning forever.

  on_abstain:
    artifact_action: preserve_approved_positioning_in_copy
    release_action: hold_copy_pending_positioning_review
    route: positioning_owner_review

  # No universal gate. Report these separately; never blend into one score.
  evaluation:
    sample: 40-60 copy samples paired with approved positioning documents — include both silent-drift and over-rigidity cases
    labelers: ">=2 independent reviewers with access to the positioning ledger, blind to the copy decision"
    labels: [positioning_preserved, silent_drift, warranted_reopen_blocked, undecidable]
    ground_truth: approved positioning document, decision ledger, and any explicitly granted reopens
    metrics:
      silent_drift_rate:
        kind: primary
        desc: Copy rewrote approved positioning without an explicit reopen.
      over_rigidity_rate:
        kind: opposite
        desc: A warranted, conditions-driven reopen was blocked or suppressed.
      forced_decision_rate:
        kind: forced
        desc: Positioning document was unavailable but a positioning call was made anyway.
      abstain_rate:
        kind: abstain
        desc: The system deferred because positioning reference was unavailable or conflict was genuinely unresolvable.
    report: separately — there is no single "positioning fidelity score"
