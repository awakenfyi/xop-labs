pack: launch-os
title: Launch OS
for: product marketing launch execution
status: PLANNED        # scaffold only; Guards need fixtures; pilot not run
result: ""             # PASS | FAIL | INCONCLUSIVE — none run yet
promise: "Verified claims, real urgency, positioning preserved, assets complete."

# Marketing xOPs — profiles of core xOPs; not new primitives
xops:
  - id: xop.claim.evidence-bound
    profile: marketing.copy
    governs: "every factual, comparative, performance claim in launch copy"
  - id: xop.marketing.urgency-evidence
    profile: marketing.conversion
    governs: "urgency and scarcity language requires verified deadline or constraint"
  - id: xop.decision.ledger
    profile: marketing.positioning
    governs: "downstream launch assets preserve approved audience and differentiation"
  - id: xop.verify.completion
    profile: launch
    governs: "an asset is not complete until it exists at destination with owner and instrumentation"

# Guards — deterministic compliance checks (not yet written)
guards:
  - launch-checklist    # asset exists · approval on file · owner named · instrumentation present

# Tests (not yet run)
tests: ~

boundary: >
  Governs evidence, urgency, positioning fidelity, and completion verification. Never automates
  creative direction, campaign strategy, pricing decisions, or final human sign-off.
